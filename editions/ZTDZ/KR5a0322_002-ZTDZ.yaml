body:
  text: 宋真宗皇帝御製通奉大夫守尚書右僕射兼中書侍郎上柱國清河郡開國公張商英奉敕命編歩虚詞一十首銅渾春律至玉闕曉煙披吉夢通天意靈文表帝期奉符成鉅典胥宇報純禧克布烝民祐應諧百福宜右一錫符瞻絳闕揆日會彤庭迎導森容衛夤威罄典刑氤氲流恊氣絡繹奏祥經苾苾修嘉薦祗祗達香冥右二將議元封禮期觀上帝心清都雲杳杳丹禁漏沈沈先覺迴飈馭遵期錫玉音喬封成紀號䖍鞏倍欽欽右三上封初蕆事吉夢復通真玉檢功成近龜書錫祐臻靈丘揚典禮恭館答威神介祉從穹昊流祥及下民右四岱嶽琅凾至神州藻仗迎流金炎氣散觸石慶雲生喜見傾都意歡聞載路聲華簮皆仰望仙羽表殊清右五神臯求爽塏珍館法圜清鴻應流無極丕功見有成發祥開茂緒介祉佑羣生億兆觀宏壯䖍恭意倍傾右六夕夢通中禁仙游降上蒼鴻源昭濬發丕曆恊無疆報況䖍心積儲休瑞命昌慶雲知不竭億載保咸康右七福地求清界良金範粹儀中霄聞聖訓邃古啓昌期累洽彰敷祐精衷報錫禧乾乾瞻肖像簡簡茂丕基右八蘂宫成壯麗郢匠極精微層閣形疑湧虚簷勢若飛寳龜生緑毳畫棟見靈輝欽奉求多福常期惠九圍右九𥦖窱門扄啓崢嶸殿宇開雲低龍影度風静鶴音來金簡藏三洞飄車湊九垓何煩言閬苑即此是龜臺右十玉清樂一十首玉清樂玉清聖境異諸天玉清樂五門髙敞在雲中玉清樂知與三天路闇通玉清樂絳節參差凝瑞日玉清樂洞音縹緲引和風玉清樂玉清樂右一祕殿岧嶤象玉虚玉清樂飈遊臨暨福祥敷玉清樂百神設衛尊靈命玉清樂億載延禧佑帝圖玉清樂玉清樂右二千尺髙髙薄紫煙玉清樂望中隱隱見靈仙玉清樂上藏玉字昭丕貺玉清樂下佑璿圖保億年玉清樂玉清樂右三宏構巍巍如嶽峙玉清樂層軒弈弈狀翬飛玉清樂上清降治流鴻福玉清樂下土祈褫仰烈輝玉清樂玉清樂右四畫棟華榱臨福地玉清樂琅函金簡祕仙經玉清樂民風永使臻清靜玉清樂帝緒常期奉慶靈玉清樂玉清樂右五虚廊顯敞列丹青玉清樂萬彚森然罔遁形玉清樂已桉玉書圖隱景玉清樂更摹寳應載祥經玉清樂玉清樂右六三尺齋壇碧玉成玉清樂五更醮席對繁星玉清樂靈儀祗率遵三洞玉清樂景福咸臻保萬齡玉清樂玉清樂右七萬壽無疆期景貺玉清樂百靈咸秩表䖍心玉清樂蕭薌午夜思昭格玉清樂歘駕層霄想降臨玉清樂玉清樂右八臺號通天聞漢氏玉清樂閣名降聖想唐時玉清樂豈將往古矜宏壯玉清樂但冀烝民受福禧玉清樂玉清樂右九測影神臯求吉地玉清樂僝工剛日建宏規玉清樂烝黎受福應無筭玉清樂穹昊延祥悉在兹玉清樂玉清樂右十太清樂一十首太清樂太清樂太清何處以逍遥太清樂寳籙凝祥下玉虚太清樂靈心敷祐屬瑶圖太清樂肇開恭館揚丕祐太清樂永祕琅函在上都太清樂太清樂右一金繩揆日將成禮太清樂玉字遵期復降靈太清樂緬法圜方營壯麗太清樂仰延飇歘答髙明太清樂太清樂右二仙官協夢告靈期太清樂真馭排雲下禁闈太清樂鴻緒發源聞錫羡太清樂珠宫報貺務夤威太清樂太清樂右三貢金在冶鎔天表太清樂離衛遵塗展國經太清樂邃古發祥成茂緒太清樂億年恭已奉鴻靈太清樂太清樂右四珍符錫祐彰垂𥙿太清樂祕宇成功答降祥太清樂勵翼豈曽忘夙夜太清樂誠明常冀達穹蒼太清樂太清樂右五苾芬清夜列皇闈太清樂星斗熒熒瑞氣滋太清樂玉酒更無餘瀝在太清樂飇車黙有降臨期太清樂太清樂右六顯敞層楹奉帝期太清樂森羅珍果備鴻儀太清樂芳馨徧享彰來格太清樂感應冥通見錫禧太清樂太清樂右七天柱喬峯藏瑞石太清樂道林開土著微辭太清樂真宗濬發形先覺太清樂丕曆延洪示後期太清樂太清樂右八昊穹降鑒顯鴻威太清樂方冊披文敘烈輝太清樂瑞日德星常並照太清樂矞雲恊氣每交飛太清樂太清樂右九方地效祥羣寳日太清樂靈芝擢秀瑞尤多太清樂已占共頴符多稼太清樂更育交柯恊至和太清樂太清樂右十白鶴讃一十首羣嬉瑞羽出青田望以霜華編撓天人丗不知空仰嘆靜思應是洞中仙右一仙姿相續呈祥至瑞典徐觀自古同方信揚音清蹕内還同矯翼燎煙中右二霜翎髙逐祥風勢朱頂低浮瑞日輝爲顯靈心來表瑞前迎祕籙每羣飛右三八景戒期登祕宇九清敷佑恊祥經曽雲頡頏瞻仙羽暴日徘徊在福庭右四五金鎔範粹儀成千里森羅藻衛行應有靈仙來述職化爲珍羽蔽空迎右五福地將興槖籥功人心祗慄夙宵同忽觀淬羽丹青色飛上瑶壇煙霧中右六良治將期覩粹容醮壇先事禱神功豈期嘉薦當中夜忽有仙音在半空右七舳艫相接濟洪川萬目叢觀意惕然因見靈潮來巨壑益知降祉自髙天右八寳艦乗流近帝都應龍表瑞見全軀不隨蓊鬱飛雲去常與輝煌藻衛俱右九鴻淵極目接蒼煙巨艦揚帆獨晏然不獨陽侯收駭浪更觀等覺見金田右十散花詞一十首玉宇千門啓金爐百和然芬芳盈法座祗慄待羣仙右一天上春常在花開不計時瑶壇霑瑞露芳氣更蕃滋右二仙葩色最紅望與火雲同爲問生何處瀛洲清景中右三仙花不記名百歩有芳馨華席開清醮飇車降紫庭右四洞中春不歇常有百花香攀折來瑶席芬芳徧道場右五禁苑花齊發人間第一芳雕盤和湛露蘭殿奉虚皇右六非剪亦非裁先春曉夕開爲迎真馭至常有好風催右七散花花不盡徧在玉清中還似卿雲起紛紛迊碧空右八空裏花無際元生玉帝宫只來臨靖館不去逐和風右九此花顔色異片片綺霞飛散布瑶壇上徧霑羽客衣右十又散花詞七言一十首散花何處最花多天上髙天有大羅花在此中生本異況將瑞露慶雲和右一崑丘絶頂有龜臺臺上竒花四序開不是羣仙朝玉帝何由散到丗間來右二天上天花旦夕開不同人丗待春來天花每有天人折將獻層城日幾回右三瑶臺半夜露華滋月帔朝真在此時時有仙花空裏降吹來玉宇奉金姿右四五色竒葩降洞天仰觀空裏勢翩翩莫言仙境常時有動是人寰億萬年右五仙花折得自仙宫散在珍臺曉景中玉闕有春春不老璿圖受福福无窮右六羽客驂鸞在半天下瞻珍館意乾乾蓬萊折得花无數散在殊庭黼座前右七上林花卉先春發幽谷鶯聲尚未知不遣常人攀折得盡將福地奉真期右八洞中三十六天春仙境由來異丗人採得名花何處去將來宫館奉髙真右九仙官真侣往還頻去看蓬山閬苑春每採芳華朝上帝願均福佑及生民右十金籙齋三洞讃詠儀卷中
