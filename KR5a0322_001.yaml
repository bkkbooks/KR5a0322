body:
  text: 宋太宗皇帝御製通奉大夫守尚書右僕射兼中書侍郎上柱國清河郡開國公張商英奉敕命編步虛詞十首清靜建金壇無為大道理歸依玉帝前稽首求宗㫖發詠𤑔名香一心專不巳願同四海知萬億神仙子悟即杳冥中玄談皆彼此真人受命時覺者有終始象外好優遊愚情生謗毀羽蓋駕青龍行遍八方水右一天尊馭六龍百萬神仙騎雲起自逍遙五音皆鼓吹碧桃爛熟時七寶林中賜白鳳集千羣雪身排玉趐華嚴如意珠聖化不思議師子善非常華胥妙法智凡愚有道心慧眼衆生施無限小丫童蘂宫深殿戲右二玉籙受經師科儀尊上帝頌聲丗界中道業心相濟靈寶度衆生丹丘雲雨翳虛無入太清白鶴聲嘹唳百谷盡朝宗煙霞全美麗囂塵自不迷祕要門開閉洞府最深嚴神仙無繫綴天髙似掌平一一皆精細右三上帝化無窮仙居紫府位信心杳若空稽首拜天地晴霽布星羅真門持不二十州散雨花五福真人祕符瑞表其恭戰兢擎寶器善哉諸法師祈福來凡意功行滿三千心緣勿退志歸依大道君一切靈官記右四仙集會玄都法輪常轉處持齊振寶鈴冬夏無寒暑絳節蘂珠官瀛洲臨逺渚天尊侍立人崇道絶私語妙入大乘經六情皆盡去默然念在心淡泊勿疑阻月皎盛明時清娥搖玉杵叩鍾雅調音錬質容相許右五天上典人間黃衣受玉籙經開道眼明持念果成速若遇邪魔臨灰心似草木丹田是命根俯仰皆生福鶴骨為餐霞修行如野鹿三才鬱茂中執卷但勤讀太一及星官康民無反覆還淳務實時四序長盈縮右六慕道要歸真知非求得一先須修鍊心甚好變凡質禮懴用精專登壇明似日六丁驅使易去住如風疾念呪與神符邪魔無縱逸青詞奏表章善惡包凶吉元始諸天尊聖言分甲乙香燈及醮茶噀弄神刀筆右七七寶琉璃宫飛符排絳節玉京鎮十方衆真頌真訣天地杳冥中景雲浮不絶太仙跨鶴遊齊醮清嚴潔詠讃亦非常長生無隕滅上帝伏魔王執事皆賢哲下察向黎民靈官為等列香華從輦時揚教動喉舌右八寶鐸振鑾鳴諸仙相聚集較量髙下時浮淺不能入旋繞如意珠破壞善修葺玉皇朝謁前真人傍侍立步虛聽自然仰望華胥邑駕鶴與乘龍祥光起熠熠三千功行來壷有大丹粒玄都鎮八方臨壇皆蓊鬱清風發播揚養命存噓吸右九日月五星明公平鑒善惡三官五帝君億萬周遊樂法雨從行時乘雲與駕鶴如意一顧身所化化城郭馥郁杳冥中真宗皆淡泊九天利物多寶林葉交錯象教福人間仙花開紫蕚剛柔轉智輪大道心依託右十白鶴讃一十首白鶴凝霜一頂紅常隨碧落杳冥中三清好是逍遙處天上人間事不同右一白鶴生來羽翼鮮一聲髙唳玉皇前虛無境裏飛翔異去住人稀到九天右二白鶴希竒瑩月華雪毛翳日戀朝霞神仙抱向長生殿踈羽飛騰出絳紗右三白鶴非凡逈不同人間描在畫幈中桃花結子千年實自在優遊萬里空右四白鶴雲中朝太清玉童髙送鳳池鳴常教棲宿蟠挑下三島真人畫不成右五白鶴毛欹夜月圓髙飛來至步虛前仙壇絳節霓裳舞太一真人福壽年右六白鶴靈禽與壽年生教常得羽毛鮮五雲自有千峰嶂紫蓋巖巒海上仙右七白鶴銜丹羽翼輕玉皇常使混三清崑崙來去飛間暇五色雲中萬里程右八白鶴朱紅一頂深鈞天似聽沃羣心常隨羽客避人丗碧玉桃花萬丈尋右九白鶴山髙第九層毛衣潔淨瑩春冰化人宫室諸天逺雲翼靈飛大道稱右十太清樂二十首太清樂太清樂太清樂處以逍遙太清樂紫微瑞色駕青龍太清樂玉籙香箋夜奏封太清樂羽蓋雲中皆縹眇太清樂霓裳一舞貌思恭太清樂太清樂右一精誠大道動幽元太清樂天地常存不死仙太清樂象外不同人丗界太清樂衆生願福太平年太清樂太清樂右二帝星明耀斗星魁太清樂絳闕雲浮夜醮臺太清樂七寶山髙棲白鳳太清樂瓊樓十二月中來太清樂太清樂右三仙官朝會儼珠旒太清樂素月當天運九秋太清樂方丈雲軿間玉闕太清樂巍巍瞻望殿依樓太清樂太清樂右四焚香夜啓醮仙壇太清樂麗景遲遲柳拂煙太清樂天上星繁光溢目太清樂真人似降步虛前太清樂太清樂右五黃衣受籙用心勞太清樂法事壇前夜佩刀太清樂修鍊但教祛俗態太清樂瀛洲仙境不爭髙太清樂太清樂右六秋風入律正凄清太清樂道法邪魔振鐸鈴太清樂恬淡虛無真可重太清樂科儀次第夜堪聽太清樂太清樂右七遙天薄暮景雲連太清樂一軸青詞月下文太清樂四氣調來思長養太清樂仙壇夜醮紫微君太清樂太清樂右八時來樂道正熙熙太清樂八極靈仙是我師太清樂太一真人臨土字太清樂蟠桃枝下屬文詞太清樂太清樂右九風清恬淡夜焚香太清樂光景如流四序長太清樂瑞氣浮空何快意太清樂醮茶不敢預先嘗太清樂太清樂右十九天無間運三清太清樂夜月寒光海上明太清樂紫府洞中堪眷戀太清樂步虛齊唱一聲聲太清樂太清樂右十一夜壇移燭似流星太清樂駕鶴乘龍羽蓋輕太清樂勢聳雲端成絳闕太清樂十洲花好洞中明太清樂太清樂右十二步虛文好思無窮太清樂姑射道遙夜境中太清樂龍闕降祥天畔出太清樂韶音逺聽貫心聰太清樂太清樂右十三天仗門開闢帝閽太清樂登壇玉籙受經文太清樂谽谺洞府吞祥氣太清樂王母追遊駕五雲太清樂太清樂右十四玉皇下視九天清太清樂仰望層霄一炷馨太清樂勝境幽竒千萬億太清樂延年字字受丹經太清樂太清樂右十五上方章奏起清編太清樂道士科儀事業專太清樂玉燭調來雲靉靆太清樂丹丘遊歷莫知年太清樂太清樂右十六竒絶文通妙入神太清樂凝情瑞雪斤紛紛太清樂玉華殿裏排章奏太清樂月滿楹庭擁白雲太清樂太清樂右十七寶閣香飄繞殿樞太清樂帝城緣業士民居太清樂天真可愛遙空裏太清樂子育黎元盡樂胥太清樂太清樂右十八大象星羅混太清太清樂五千言道丗長生太清樂神仙來往雲霞麗太清樂白鳳經天自有程太清樂太清樂右十九一聲鶴唳九霄中太清樂王母行天閬苑風太清樂幾許仙人來侍從太清樂齊心清潔盡微躬太清樂太清樂右二十金籙齊三洞讃詠儀卷上
